<script>
// ===== SERVICE WORKER REGISTRATION =====
// Blob-URL SW not supported on iOS Safari — skip gracefully
// SW only works when served from a real origin (not file://)
if ('serviceWorker' in navigator && location.protocol !== 'blob:' && location.hostname !== '') {
  try {
    // Only register if we have a real SW file (not inline blob)
    // This is intentionally left as a no-op for file:// usage
  } catch(e) {}
}

// ===== DEVICE ID — كل جهاز ليه ID فريد =====
// بنخزّن ID عشوائي في localStorage نفسه — لو جهاز جديد يولّد ID جديد
(function() {
  const RAW_KEY = '__pt_device_id__';
  let did = null;
  try { did = localStorage.getItem(RAW_KEY); } catch(e) {}
  if (!did) {
    did = 'dev_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    try { localStorage.setItem(RAW_KEY, did); } catch(e) {}
  }
  window.__PT_DEVICE_ID__ = did;
})();

// ===== LOCAL STORAGE HELPERS — مفاتيح خاصة بكل جهاز =====
const LS = {
  _prefix() { return 'pt_' + (window.__PT_DEVICE_ID__ || '') + '_'; },
  get(key, fallback) {
    try { const v = localStorage.getItem(this._prefix() + key); return v !== null ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
  },
  set(key, val) {
    try { localStorage.setItem(this._prefix() + key, JSON.stringify(val)); } catch(e) {}
  }
};
</script>
<style>
/* ===== ELEGANT ANIMATIONS ===== */

/* Clock digit flip */
#timeDigits {
  transition: opacity 0.28s ease, transform 0.28s ease;
}

/* Header card entrance */
@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes breathe {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.7; }
}

.header-card {
  animation: fadeSlideDown 0.7s cubic-bezier(0.22,1,0.36,1) both;
}
.location-badge {
  animation: fadeIn 0.6s 0.15s ease both;
}
.hijri-date {
  animation: fadeIn 0.6s 0.25s ease both;
}
#currentTime {
  animation: fadeSlideDown 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
}
.prayers-row {
  animation: fadeIn 0.6s 0.4s ease both;
}

/* Content card staggered entrance */
.content-card {
  animation: fadeSlideUp 0.7s 0.2s cubic-bezier(0.22,1,0.36,1) both;
}

/* Widgets cascade in */
.widget:nth-child(1) { animation: fadeSlideUp 0.55s 0.3s cubic-bezier(0.22,1,0.36,1) both; }
.widget:nth-child(2) { animation: fadeSlideUp 0.55s 0.38s cubic-bezier(0.22,1,0.36,1) both; }
.widget:nth-child(3) { animation: fadeSlideUp 0.55s 0.46s cubic-bezier(0.22,1,0.36,1) both; }
.widget:nth-child(4) { animation: fadeSlideUp 0.55s 0.54s cubic-bezier(0.22,1,0.36,1) both; }
.widget:nth-child(5) { animation: fadeSlideUp 0.55s 0.62s cubic-bezier(0.22,1,0.36,1) both; }
.widget:nth-child(6) { animation: fadeSlideUp 0.55s 0.70s cubic-bezier(0.22,1,0.36,1) both; }

/* Pulsing dot on next prayer */
.prayer-col.next-prayer .prayer-icon-wrap::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.35);
  animation: pulseRing 2.4s ease-out infinite;
}
.prayer-col.next-prayer .prayer-icon-wrap {
  position: relative;
}
@keyframes pulseRing {
  0%   { transform: scale(0.9); opacity: 0.8; }
  60%  { transform: scale(1.25); opacity: 0; }
  100% { transform: scale(1.25); opacity: 0; }
}

/* Countdown widget subtle pulse */
.widget.countdown-widget {
  animation: fadeSlideUp 0.55s 0.3s cubic-bezier(0.22,1,0.36,1) both;
}

/* Smooth page transitions for inner pages */
.inner-page {
  animation: fadeIn 0.25s ease both;
}
#mushafOverlay {
  animation: fadeIn 0.25s ease both;
}

/* Separator line draw */
@keyframes drawLine {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}
.sep-line {
  transform-origin: right center;
  animation: drawLine 0.6s 0.35s ease both;
}

/* AM/PM soft fade */
#timeAmPm {
  transition: opacity 0.4s ease;
}

/* ===== FLOATING STARS IN HEADER ===== */
.star-particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  pointer-events: none;
  z-index: 1;
}
@keyframes floatStar {
  0%   { transform: translateY(0px) scale(1);   opacity: 0.5; }
  50%  { transform: translateY(-18px) scale(1.2); opacity: 0.9; }
  100% { transform: translateY(0px) scale(1);   opacity: 0.5; }
}

/* ===== SHIMMER ON WIDGETS ===== */
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
.widget-shimmer::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.18) 50%, transparent 60%);
  background-size: 200% 100%;
  animation: shimmer 3.5s ease infinite;
  pointer-events: none;
}

/* ===== WIDGET HOVER LIFT ===== */
.widget {
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
              box-shadow 0.22s ease,
              background 0.5s ease !important;
}
.widget:hover {
  transform: translateY(-3px) scale(1.012);
  box-shadow: 0 8px 24px rgba(0,0,0,0.13);
}
.widget:active {
  transform: scale(0.96) !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07) !important;
}

/* ===== GLOW ON COUNTDOWN WIDGET ===== */
@keyframes greenGlow {
  0%, 100% { box-shadow: 0 0 0px rgba(30,77,59,0); }
  50%       { box-shadow: 0 0 22px rgba(30,200,100,0.22); }
}
.widget.countdown-widget {
  animation: fadeSlideUp 0.55s 0.3s cubic-bezier(0.22,1,0.36,1) both,
             greenGlow 3s 1.5s ease-in-out infinite;
}

/* ===== TASBIH RIPPLE ===== */
@keyframes ripple {
  0%   { transform: scale(0);   opacity: 0.5; }
  100% { transform: scale(3.5); opacity: 0;   }
}
.tasbih-btn {
  position: relative;
  overflow: hidden;
  transition: background 0.35s ease, transform 0.12s ease !important;
}
.tasbih-ripple {
  position: absolute;
  border-radius: 50%;
  width: 60px; height: 60px;
  margin-top: -30px; margin-left: -30px;
  background: rgba(255,255,255,0.35);
  animation: ripple 0.55s linear forwards;
  pointer-events: none;
}

/* ===== TASBIH COUNT POP ===== */
/* countPop animation removed */

/* ===== AZKAR SLIDE TRANSITION ===== */
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(28px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-28px); }
  to   { opacity: 1; transform: translateX(0); }
}
.azkar-slide-in  { animation: slideInRight 0.32s cubic-bezier(0.22,1,0.36,1) both; }
.azkar-slide-back { animation: slideInLeft  0.32s cubic-bezier(0.22,1,0.36,1) both; }

/* ===== PAGE TRANSITIONS ===== */
@keyframes slideUpIn {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideDownOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(40px); }
}
.inner-page {
  animation: slideUpIn 0.38s cubic-bezier(0.22,1,0.36,1) both !important;
}
#mushafOverlay {
  animation: slideUpIn 0.38s cubic-bezier(0.22,1,0.36,1) both !important;
}

/* ===== MUSHAF WIDGET SHIMMER ===== */
.widget.mushaf-widget::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0) 100%);
  background-size: 200% 200%;
  animation: shimmer 4s ease infinite;
  pointer-events: none;
}

/* ===== WIRD WIDGET RING PULSE ===== */
@keyframes ringPulse {
  0%, 100% { opacity: 0.15; }
  50%       { opacity: 0.30; }
}
.ring-wrap { animation: ringPulse 2.5s ease-in-out infinite; }

/* ===== HEADER MOSQUE FLOAT ===== */
@keyframes mosqueFloat {
  0%, 100% { transform: translateX(-50%) translateY(0px); }
  50%       { transform: translateX(-50%) translateY(-4px); }
}
.mosque-bg { animation: mosqueFloat 5s ease-in-out infinite; }

/* ===== HIJRI DATE SUBTLE BREATHE ===== */
@keyframes subtleBreathe {
  0%, 100% { opacity: 1; letter-spacing: 0; }
  50%       { opacity: 0.85; letter-spacing: 0.3px; }
}
.hijri-date { animation: fadeIn 0.6s 0.25s ease both, subtleBreathe 6s 1s ease-in-out infinite; }

/* ===== PRAYER TIME NEXT HIGHLIGHT ===== */
@keyframes nextPrayerGlow {
  0%, 100% { text-shadow: none; }
  50%       { text-shadow: 0 0 10px rgba(255,255,255,0.6); }
}
.prayer-col.next-prayer .prayer-time-val {
  animation: nextPrayerGlow 2.5s ease-in-out infinite;
  color: #e8f5a0;
}

/* ===== LOCATION BADGE SUBTLE PULSE ===== */
@keyframes badgePing {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  50%       { box-shadow: 0 0 0 4px rgba(255,255,255,0.08); }
}
.location-badge { animation: fadeIn 0.6s 0.15s ease both, badgePing 4s 1s ease-in-out infinite; }

/* ===== AZKAR TAP BUTTON WAVE ===== */
@keyframes waveBtn {
  0%, 100% { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  50%       { box-shadow: 0 6px 24px rgba(0,0,0,0.22); }
}
.azkar-tap-big { animation: waveBtn 2.5s ease-in-out infinite; }

/* ===== PROGRESS BAR SHINE ===== */
@keyframes barShine {
  0%   { background-position: -100% center; }
  100% { background-position:  200% center; }
}
.azkar-progress-bar {
  background-image: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent) !important;
  background-size: 60% 100%;
  background-repeat: no-repeat;
  animation: barShine 2s linear infinite;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; tap-highlight-color: transparent; }

body {
  background: #ede9e0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  font-family: 'Cairo', sans-serif;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
}

/* Desktop: show phone mockup */
@media (min-width: 480px) {
  body {
    background: #0d0d0d;
    padding: 20px 0;
  }
  .phone {
    width: 375px;
    border-radius: 44px;
    min-height: 812px;
  }
  .top-label { display: block; }
}

/* Mobile: full screen, no phone shell */
@media (max-width: 479px) {
  body {
    padding: 0;
  }
  .phone {
    width: 100%;
    border-radius: 0;
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }
  .top-label { display: none; }
}

.phone {
  background: #ede9e0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

button, a, [onclick], .widget, .surah-item, .wird-page-dot, .tasbih-btn, .toggle-pill {
  -webkit-tap-highlight-color: transparent !important;
  tap-highlight-color: transparent !important;
  outline: none;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

.top-label {
  color: #888;
  font-size: 12px;
  padding: 14px 20px 6px;
  text-align: right;
}

/* ===== DYNAMIC HEADER CARD ===== */
.header-card {
  background: #1e4d3b;
  border-radius: 24px;
  margin: 0 10px 8px;
  padding: 16px 18px 18px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background 2.5s ease;
}

/* Sky scene layer */
#skyScene {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
/* Sun / Moon element */
#skyOrb {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  transition: all 2.5s cubic-bezier(0.4,0,0.2,1);
}
/* Horizon glow */
#skyHorizon {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 55%;
  pointer-events: none;
  transition: all 2.5s ease;
  border-radius: 0 0 24px 24px;
}
/* Stars container */
#skyStars {
  position: absolute;
  inset: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
}
/* Clouds */
.sky-cloud {
  position: absolute;
  border-radius: 50px;
  pointer-events: none;
  transition: opacity 2s ease, background 2.5s ease;
}
@keyframes cloudDrift {
  0%   { transform: translateX(0px); }
  50%  { transform: translateX(8px); }
  100% { transform: translateX(0px); }
}
@keyframes orbFloat {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-5px); }
}
@keyframes starTwinkle {
  0%,100% { opacity: 0.6; }
  50%      { opacity: 1; }
}
@keyframes sunRays {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
#sunRays {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  transition: opacity 2s ease;
  animation: sunRays 20s linear infinite;
}

.mosque-bg {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  pointer-events: none;
}

.location-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.13);
  color: #d4ead9;
  padding: 5px 12px 5px 10px;
  border-radius: 20px;
  font-size: 12.5px;
  font-weight: 600;
  width: fit-content;
  margin-bottom: 8px;
  position: relative;
  z-index: 3;
  align-self: flex-end;
}
.pin-icon { width: 13px; height: 13px; fill: #d4ead9; flex-shrink: 0; }

.hijri-date {
  color: #fff;
  font-size: 26px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 2px;
  position: relative;
  z-index: 3;
}

.current-time {
  color: #fff;
  font-size: 58px;
  font-weight: 800;
  text-align: center;
  line-height: 1.05;
  position: relative;
  z-index: 3;
  margin-bottom: 14px;
}

.sep-line {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.2);
  margin-bottom: 12px;
  position: relative;
  z-index: 3;
}

.prayers-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  position: relative;
  z-index: 3;
}

.prayer-col {
  display: flex;
  flex-direction: column;
  align-items: center;

  flex: 1;
}

.prayer-label {
  color: #c2ddc9;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  white-space: nowrap;
}

.prayer-icon-wrap {
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.prayer-icon-wrap svg { width: 26px; height: 26px; }

.prayer-col.next-prayer .prayer-icon-wrap {
  background: rgba(255,255,255,0.16);
  border-radius: 50%;
  width: 36px;
  height: 36px;
}

.prayer-time-val {
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  text-align: center;
}

.col-div {
  width: 1px;
  background: rgba(255,255,255,0.2);
  height: 54px;
  align-self: flex-end;
  margin-bottom: 2px;
}

/* ===== CREAM CONTENT AREA ===== */
.content-card {
  background: #ede9e0;
  border-radius: 24px;
  margin: 0 10px 14px;
  flex: 1;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ===== WIDGET GRID ===== */
.widgets-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.widget {
  background: #fff;
  border-radius: 18px;
  padding: 14px 12px 12px;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  position: relative;
  overflow: hidden;
}
.widget:active { transform: scale(0.97); }

.widget-icon {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 6px;
  flex-shrink: 0;
}

.widget-title {
  font-size: 12px;
  font-weight: 700;
  color: #333;
  margin-bottom: 4px;
}

.widget-value {
  font-size: 22px;
  font-weight: 800;
  color: #1e4d3b;
  line-height: 1.1;
  margin-top: auto;
}

.widget-sub {
  font-size: 10.5px;
  color: #999;
  font-weight: 600;
  margin-top: 2px;
}

/* Next prayer countdown widget */
.widget.countdown-widget {
  background: #1e4d3b;
}
.widget.countdown-widget .widget-title { color: #a8cdb5; }
.widget.countdown-widget .widget-value { color: #fff; font-size: 26px; }
.widget.countdown-widget .widget-sub { color: #6aaa88; }
.widget.countdown-widget .widget-icon { opacity: 0.85; }
.next-prayer-name {
  font-size: 11px;
  color: #e8c84a;
  font-weight: 700;
  margin-bottom: 2px;
}

/* Wird widget */
.widget.wird-widget { background: #fff8ee; }
.widget.wird-widget .widget-value { color: #b86a00; }

/* Progress ring for wird */
.ring-wrap {
  position: absolute;
  left: 10px;
  bottom: 10px;
  opacity: 0.15;
}
.ring-wrap svg { width: 44px; height: 44px; }

/* Tasbih widget */
.widget.tasbih-widget { background: #f0f7ff; }
.widget.tasbih-widget .widget-value { color: #1a5fa8; font-size: 26px; }

/* Tasbih dua text */
.tasbih-dua {
  font-size: 11.5px;
  font-weight: 700;
  color: #1a5fa8;
  text-align: center;
  margin-bottom: 4px;
  line-height: 1.4;
  min-height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tasbih-progress {
  font-size: 10px;
  color: #7aaed4;
  font-weight: 600;
  text-align: center;
  margin-bottom: 4px;
}

/* Quran (Mushaf) widget - half width now */
.widget.mushaf-widget {
  background: linear-gradient(135deg, #1e4d3b 0%, #2d6e54 100%);
  flex-direction: column;
  gap: 4px;
  padding: 14px 12px 12px;
}
.mushaf-widget .widget-icon { margin-bottom: 4px; }
.mushaf-widget .widget-title { color: #a8cdb5; font-size: 12px; margin-bottom: 2px; }
.mushaf-widget .widget-value { color: #fff; font-size: 15px; margin-top: 0; }
.mushaf-widget .widget-sub { color: #6aaa88; }
.mushaf-info { display: flex; flex-direction: column; flex: 1; }

/* Azkar sabah widget */
.widget.azkar-widget { background: #f5f0ff; }
.widget.azkar-widget .widget-value { color: #6b35c8; font-size: 15px; font-weight: 700; line-height: 1.3; }

/* Azkar masaa widget */
.widget.azkar-masaa-widget { background: #0f1f3a; }
.widget.azkar-masaa-widget .widget-title { color: #8aabcf; }
.widget.azkar-masaa-widget .widget-value { color: #c8dff5; font-size: 15px; font-weight: 700; line-height: 1.3; }
.widget.azkar-masaa-widget .toggle-pill { background: #1a3a5c; color: #8aabcf; }
.widget.azkar-masaa-widget .toggle-pill.done { background: #1a4a2e; color: #6aaa88; }
.widget.azkar-masaa-widget .toggle-dot { background: #4a7fa8; }
.widget.azkar-masaa-widget .toggle-pill.done .toggle-dot { background: #4aaa70; }

/* Azkar toggle */
.azkar-status {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}
.toggle-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: #ede6ff;
  border-radius: 20px;
  padding: 4px 10px;
  cursor: pointer;
  transition: background 0.2s;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #6b35c8;
}
.toggle-pill.done {
  background: #d4f0e0;
  color: #1e7a4e;
}
.toggle-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #6b35c8;
  transition: background 0.2s;

(function() {

.widget.azkar-masaa-widget { background: #0f1f3a; }
.widget.azkar-masaa-widget .widget-title { color: #8aabcf; }
.widget.azkar-masaa-widget .widget-value { color: #c8dff5; font-size: 15px; font-weight: 700; line-height: 1.3; }
.widget.azkar-masaa-widget .toggle-pill { background: #1a3a5c; color: #8aabcf; }
.widget.azkar-masaa-widget .toggle-pill.done { background: #1a4a2e; color: #6aaa88; }
.widget.azkar-masaa-widget .toggle-dot { background: #4a7fa8; }
.widget.azkar-masaa-widget .toggle-pill.done .toggle-dot { background: #4aaa70; }

/* Azkar toggle */
.azkar-status {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}
.toggle-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: #ede6ff;
  border-radius: 20px;
  padding: 4px 10px;
  cursor: pointer;
  transition: background 0.2s;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #6b35c8;
}
.toggle-pill.done {
  background: #d4f0e0;
  color: #1e7a4e;
}
.toggle-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #6b35c8;
  transition: background 0.2s;
}
.toggle-pill.done .toggle-dot { background: #1e7a4e; }

/* Tasbih big tap button */
.tasbih-btn {
  width: 100%;
  background: #1a5fa8;
  border: none;
  border-radius: 14px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 800;
  padding: 12px;
  cursor: pointer;
  margin-top: 6px;
  transition: background 0.1s, transform 0.1s;
  letter-spacing: 0.5px;
}
.tasbih-btn:active { background: #154d8a; transform: scale(0.97); }

.tasbih-reset {
  background: none;
  border: none;
  color: #aac4e0;
  font-family: 'Cairo', sans-serif;
  font-size: 10px;
  cursor: pointer;
  text-align: center;
  width: 100%;
  margin-top: 2px;
}

/* Mushaf open button */
.mushaf-open-btn {
  background: rgba(255,255,255,0.18);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 6px 12px;
  cursor: pointer;
  margin-top: 8px;
  width: fit-content;
  transition: background 0.2s;
}
